name: Build Kamel TV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
        - name: Checkout code
      uses: actions/checkout@v4
    
        - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
        - name: Setup Flutter 3.24.5
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
        cache: true
    
        - name: Prepare TV assets
      run: |
        mkdir -p android/app/src/main/res/drawable
        for dpi in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
          mkdir -p android/app/src/main/res/mipmap-$dpi
          cp assets/icon.png android/app/src/main/res/mipmap-$dpi/ic_launcher.png
        done
        cp assets/background.jpeg android/app/src/main/res/drawable/tv_banner.png
        
        # نضيف banner للـ TV
        sed -i 's/<application/<application android:banner="@drawable\/tv_banner"/' android/app/src/main/AndroidManifest.xml
    
        - name: Flutter pub get
      run: flutter pub get
    
        - name: Build APK (split)
      run: flutter build apk --release --split-per-abi
    
        - name: Build AAB
      run: flutter build appbundle --release
    
        - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: kamel-tv-apks
        path: |
          build/app/outputs/flutter-apk/*-release.apk
          build/app/outputs/bundle/release/*.aab
        retention-days: 30
