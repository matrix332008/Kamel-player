name: Android APK Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          
      - name: Recreate Android folder for v2 embedding
        run: |
          rm -rf android
          flutter create --platforms android --org com.kameltv --project-name kamel_tv .
          
      - name: Fix Android files
        run: |
          # 1. Namespace
          sed -i '/android {/a \    namespace "com.kameltv.kamel_tv"' android/app/build.gradle
          
          # 2. Permissions - الطريقة الآمنة ما تكسرش XML
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n</manifest>|' $MANIFEST
          
          # 3. Allow http traffic
          sed -i 's|<application|<application android:usesCleartextTraffic="true"|' $MANIFEST
          
      - name: Clean project
        run: flutter clean
        
      - name: Get dependencies
        run: flutter pub get
        
      - name: Generate Launcher Icons + TV Banner
        run: dart run flutter_launcher_icons
        
      - name: Build APK
        run: flutter build apk --release --verbose --no-shrink --target-platform android-arm,android-arm64,android-x64
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kamel-TV-APK
          path: build/app/outputs/flutter-apk/app-release.apk
