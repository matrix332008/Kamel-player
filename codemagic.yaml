workflows:
  android-build:
    name: Android Build Kamel TV
    max_build_duration: 60
    environment:
      flutter: 3.24.5
      java: 17
      vars:
        PACKAGE_NAME: "com.kamel.tv"  # لازم يطابق build.gradle
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > "$CM_BUILD_DIR/android/local.properties"
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> "$CM_BUILD_DIR/android/local.properties"
      
      - name: Prepare Android files
        script: |
          # ما نمسحوش android. نخليو الملفات اللي في Git
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/drawable
          cp assets/icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp assets/background.jpeg android/app/src/main/res/drawable/tv_banner.jpeg
          
          # نضيف android:banner للـ Manifest الموجود
          sed -i 's/android:icon="@mipmap\/ic_launcher"/android:icon="@mipmap\/ic_launcher" android:banner="@drawable\/tv_banner"/' android/app/src/main/AndroidManifest.xml
          
          # نضيف الـ permissions الناقصة كان موش موجودة
          if ! grep -q "FOREGROUND_SERVICE" android/app/src/main/AndroidManifest.xml; then
            sed -i '/<uses-permission android:name="android.permission.WAKE_LOCK"\/>/a \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"\/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"\/>' android/app/src/main/AndroidManifest.xml
          fi
      
      - name: Flutter clean
        script: flutter clean
      
      - name: Get dependencies
        script: flutter pub get
      
      - name: Build APK for TV
        script: flutter build apk --release --no-shrink --target-platform android-arm,android-arm64,android-x64
    
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    
    publishing:
      email:
        recipients:
          - matrix332008@gmail.com
        notify:
          success: true
          failure: true
