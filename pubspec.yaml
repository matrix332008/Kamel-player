name: kamel_player
description: Kamel TV - IPTV Player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # للشبكة و الروابط
  http: ^1.2.2
  
  # باش نحفظو الـ Favorites
  shared_preferences: ^2.3.2
  
  # المشغل الصحيح اللي يخدم m3u8 على Android TV
  flutter_vlc_player: ^7.4.1
  
  # باش الشاشة ما ترقدش وقت تتفرج
  wakelock_plus: ^1.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/background.jpeg
    - assets/icon.png
